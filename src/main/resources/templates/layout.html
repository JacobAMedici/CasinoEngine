<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <!-- General style and bootstrap from Harvard's CS50x online course based off problem set nine (Finance) -->
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">

    <!-- http://getbootstrap.com/docs/5.1/ -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" rel="stylesheet">
    <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"></script>

    <link href="/WheelIcon.webp" type="image/x-icon" rel="icon">

    <!-- Dynamic title with a default value -->
    <title th:text="${title}">Casino Games Engine</title>

    <style>
        .center-container {
            display: flex; /* Uses flexbox to align children */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            height: 100%; /* Takes full height of the viewport */
            width: 100%; /* Adjust if necessary */
        }
    </style>
</head>
<body>
<nav class="bg-light border navbar navbar-expand-md navbar-light" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Casino Engine Home</a>
        <button aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler"
                data-bs-target="#navbar" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar">
            <ul class="navbar-nav ms-auto mt-2">
                <li class="nav-item"><a class="nav-link" href="/MSP">Mississippi Stud</a></li>
            </ul>
        </div>
    </div>
</nav>

<footer class="text-center" th:fragment="footer">
    <p>© 2024 Casino Engine</p>
</footer>
</body>
</html>
